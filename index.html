<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Festa Junina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background-color: #fff3e0; }
        .btn-orange { background-color: #e65100; color: white; }
        .btn-orange:hover { background-color: #bf360c; }
        .text-orange { color: #e65100; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Tela de Login -->
    <div id="tela-login" class="w-full max-w-sm bg-white rounded-xl shadow-lg p-6 text-center border-t-4 border-orange-600">
        <h1 class="text-2xl font-black text-orange mb-2">Caixa / Retirada</h1>
        <p class="text-gray-500 mb-6 text-sm">Acesso para validar as fichas.</p>
        
        <input type="password" id="input-senha" placeholder="Senha Administrativa" class="w-full border-2 border-gray-300 p-3 rounded-lg mb-4 text-center text-lg focus:outline-none focus:border-orange-500 transition">
        
        <button id="btn-entrar" class="w-full btn-orange font-bold py-3 rounded-lg transition duration-300 flex justify-center items-center">
            Acessar Câmera
        </button>
        <p id="msg-erro" class="text-red-500 mt-3 font-medium hidden">Senha incorreta.</p>
    </div>

    <!-- Tela do Scanner -->
    <div id="tela-scanner" class="w-full max-w-lg bg-white rounded-xl shadow-lg p-6 text-center hidden">
        <div class="flex justify-between items-center mb-4 border-b pb-3">
            <h1 class="text-xl font-bold text-orange">Leitor de Fichas</h1>
            <button id="btn-sair" class="text-gray-500 font-bold hover:bg-gray-100 p-2 rounded-lg">Sair</button>
        </div>
        
        <div id="qr-reader" class="w-full mx-auto border-2 border-dashed border-orange-300 rounded-lg overflow-hidden mb-4 bg-gray-50"></div>

        <div id="resultado" class="min-h-[60px] flex items-center justify-center text-lg font-medium p-3 rounded-lg bg-orange-50 text-gray-700">
            Aponte a câmera para o QR Code do Voucher...
        </div>
    </div>

    <!-- MODAL DE RESULTADO (POP-UP) -->
    <div id="modal-resultado" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden z-50 px-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform transition-all">
            
            <!-- Cabeçalho do Modal (Sem botão de fechar X) -->
            <div class="bg-gray-100 px-4 py-3 border-b border-gray-200 text-center">
                <h3 class="text-lg font-black text-gray-800" id="modal-titulo">Processando...</h3>
            </div>
            
            <!-- Corpo do Modal -->
            <div class="p-6 text-center min-h-[160px] flex flex-col justify-center items-center" id="modal-conteudo">
                <!-- Conteúdo Dinâmico (Ícones e Mensagens) -->
            </div>
            
            <!-- Rodapé do Modal -->
            <div class="bg-gray-50 px-4 py-4 border-t border-gray-200 text-center">
                <button id="btn-ok-modal" class="w-full btn-orange font-bold py-3 rounded-lg transition duration-300">
                    Ler Próxima Ficha
                </button>
            </div>
            
        </div>
    </div>

    <script>
        // Substitua pelo URL do seu Executável (Web App)
        const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbysu1p_T3r5uiAIIPYnhxUgWlmkqvF9E7u7e3iGrUtmGBvKNfC4FukmKWqEa_ClyiNsow/exec"; 
        
        const telaLogin = document.getElementById('tela-login');
        const telaScanner = document.getElementById('tela-scanner');
        const inputSenha = document.getElementById('input-senha');
        const btnEntrar = document.getElementById('btn-entrar');
        const btnSair = document.getElementById('btn-sair');
        const msgErro = document.getElementById('msg-erro');
        
        const divResultado = document.getElementById('resultado');
        const modalResultado = document.getElementById('modal-resultado');
        const modalTitulo = document.getElementById('modal-titulo');
        const modalConteudo = document.getElementById('modal-conteudo');
        const btnOkModal = document.getElementById('btn-ok-modal');
        
        let html5QrcodeScanner = null;
        let lastScannedCode = null;
        let isScanning = false;
        let senhaValidadaEmMemoria = ""; 

        // === LÓGICA DE LOGIN ===
        btnEntrar.addEventListener('click', logar);
        inputSenha.addEventListener('keypress', (e) => { if (e.key === 'Enter') logar(); });

        function logar() {
            const senhaDigitada = inputSenha.value.trim();
            if (!senhaDigitada) return;

            btnEntrar.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 border-white border-t-2 border-b-2 rounded-full" viewBox="0 0 24 24"></svg> Validando...`;
            btnEntrar.disabled = true;

            const urlCompleta = `${URL_GOOGLE_SCRIPT}?action=login&senha=${encodeURIComponent(senhaDigitada)}`;

            fetch(urlCompleta)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        senhaValidadaEmMemoria = senhaDigitada;
                        telaLogin.classList.add('hidden');
                        telaScanner.classList.remove('hidden');
                        iniciarScanner();
                    } else {
                        msgErro.innerText = data.message || "Senha incorreta.";
                        msgErro.classList.remove('hidden');
                        setTimeout(() => msgErro.classList.add('hidden'), 3000);
                    }
                })
                .catch(error => {
                    msgErro.innerText = "Erro ao conectar.";
                    msgErro.classList.remove('hidden');
                    setTimeout(() => msgErro.classList.add('hidden'), 3000);
                })
                .finally(() => {
                    btnEntrar.innerHTML = "Acessar Câmera"; btnEntrar.disabled = false; inputSenha.value = '';
                });
        }

        btnSair.addEventListener('click', () => {
            if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.error(e));
            senhaValidadaEmMemoria = ""; 
            telaScanner.classList.add('hidden'); telaLogin.classList.remove('hidden');
        });

        // === LÓGICA DE RETOMAR SCANNER ===
        function fecharModalERetomar() {
            modalResultado.classList.add('hidden');
            divResultado.innerHTML = "Aponte a câmera para o próximo QR Code...";
            
            // Libera as variáveis para permitir uma nova leitura
            lastScannedCode = null; 
            isScanning = false; 
            
            // Despausa a câmera
            if(html5QrcodeScanner) html5QrcodeScanner.resume();
        }

        btnOkModal.addEventListener('click', fecharModalERetomar);

        // === LÓGICA DO SCANNER ===
        function iniciarScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { 
                fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0, showTorchButtonIfSupported: true
            }, false);
            html5QrcodeScanner.render(onScanSuccess, () => {});
        }

        function onScanSuccess(decodedText) {
            // Evita leitura duplicada e bloqueia novas leituras enquanto processa
            if (decodedText !== lastScannedCode && !isScanning) {
                lastScannedCode = decodedText;
                isScanning = true;
                
                // Pausa a câmera imediatamente
                html5QrcodeScanner.pause(true);
                divResultado.innerHTML = `<span class="text-blue-600 font-bold">Câmera pausada.</span>`;

                // Bloqueia e estiliza o botão "Ler Próxima Ficha" durante o processamento
                btnOkModal.disabled = true;
                btnOkModal.classList.add('opacity-50', 'cursor-not-allowed');

                // Abre o Modal em modo "Carregando"
                modalTitulo.innerText = "Consultando Servidor";
                modalConteudo.innerHTML = `
                    <svg class="animate-spin h-12 w-12 text-orange-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-gray-600 font-bold text-lg">Aguarde...</p>
                `;
                modalResultado.classList.remove('hidden');

                // Envia requisição para a Planilha
                const urlCompleta = `${URL_GOOGLE_SCRIPT}?action=registrarEntrega&idUnico=${encodeURIComponent(decodedText)}&senha=${encodeURIComponent(senhaValidadaEmMemoria)}`;
                
                fetch(urlCompleta)
                    .then(response => response.json())
                    .then(data => {
                        modalTitulo.innerText = "Resultado da Leitura";
                        if (data.success) {
                            modalConteudo.innerHTML = `
                                <div class="text-green-500 mb-3">
                                    <svg class="w-20 h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <span class="text-green-700 font-black text-2xl block leading-tight">${data.message}</span>
                            `;
                        } else {
                            modalConteudo.innerHTML = `
                                <div class="text-red-500 mb-3">
                                    <svg class="w-20 h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <span class="text-red-600 font-bold block text-xl leading-tight">${data.message}</span>
                            `;
                        }
                    })
                    .catch(error => { 
                        modalTitulo.innerText = "Erro de Conexão";
                        modalConteudo.innerHTML = `
                            <div class="text-red-500 mb-3">
                                <svg class="w-20 h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <span class="text-red-600 font-bold block text-xl">Não foi possível conectar ao servidor.</span>
                        `; 
                    })
                    .finally(() => {
                        // Reativa o botão de retomada após a resposta do servidor finalizar
                        btnOkModal.disabled = false;
                        btnOkModal.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
                
                // O scanner não será retomado automaticamente. 
                // A ação de retomada ocorrerá apenas quando o usuário clicar no botão "Ler Próxima Ficha".
            }
        }
    </script>
</body>
</html>
