<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Biblioteca HTML5-QRCode para leitura via câmera do celular ou webcam -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .scanner-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    #reader {
      width: 100%;
      background: black;
      border: none !important;
    }
    #reader__scan_region {
      background: #000;
    }
    .result-box {
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      font-size: 1.1rem;
      text-align: center;
      transition: all 0.3s;
    }
    .login-bg { 
      background-color: #e65100; 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .login-card { 
      width: 100%; 
      max-width: 400px; 
      padding: 2.5rem; 
      border-radius: 20px; 
      border: none; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
      background: white; 
    }
  </style>
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div id="telaLogin" class="login-bg">
    <div class="login-card text-center">
        <h2 class="mb-2 fw-bold text-danger"><i class="bi bi-qr-code-scan text-warning"></i> Scanner</h2>
        <p class="text-muted small mb-4">Leitor de Fichas Festa Junina</p>
        
        <div class="input-group mb-3">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
            <input type="password" id="senhaInput" class="form-control border-start-0 ps-0 bg-light" placeholder="Senha do Administrador" onkeypress="if(event.key === 'Enter') fazerLogin()">
        </div>
        
        <button class="btn btn-warning text-dark w-100 fw-bold py-2 mb-2" onclick="fazerLogin()">Acessar Scanner</button>
        <div id="erroLogin" class="text-danger small fw-bold" style="display: none;">Senha incorreta. Tente novamente!</div>
    </div>
  </div>

  <!-- TELA DO SCANNER -->
  <div id="telaScanner" class="container py-4" style="display: none; max-width: 600px;">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-danger"><i class="bi bi-qr-code-scan"></i> Validador de Vouchers</h3>
      <p class="text-muted">Aponte a câmera para o QR Code da ficha impressa ou digital</p>
    </div>

    <div class="card scanner-card mb-4">
      <div id="reader"></div>
    </div>

    <!-- BOX DE RESULTADOS E RETORNO -->
    <div id="loadingScanner" class="text-center py-3" style="display: none;">
      <div class="spinner-border text-warning" role="status"></div>
      <p class="mt-2 text-muted fw-bold">Consultando banco de dados...</p>
    </div>

    <div id="resultadoValida" class="result-box d-none"></div>

    <!-- BOTÕES DE CONTROLE -->
    <div class="d-grid gap-2 mt-3">
      <button id="btnReset" class="btn btn-outline-secondary d-none" onclick="reiniciarLeitor()">
        <i class="bi bi-arrow-clockwise"></i> Escanear Próximo
      </button>
    </div>
  </div>

  <script>
    let html5QrcodeScanner = null;
    let senhaValidada = "";

    function fazerLogin() {
      const senha = document.getElementById("senhaInput").value;
      if (!senha) return;

      document.getElementById("erroLogin").style.display = "none";
      
      // Valida efetuando uma chamada de teste no backend
      google.script.run
        .withSuccessHandler(function(data) {
          if (data && data.error === "Acesso Negado") {
            document.getElementById("erroLogin").style.display = "block";
          } else {
            senhaValidada = senha;
            document.getElementById("telaLogin").style.display = "none";
            document.getElementById("telaScanner").style.display = "block";
            inicializarScanner();
          }
        })
        .withFailureHandler(function() {
          document.getElementById("erroLogin").innerText = "Erro ao conectar.";
          document.getElementById("erroLogin").style.display = "block";
        }).getDashboardData(senha);
    }

    function inicializarScanner() {
      html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
          fps: 10, 
          qrbox: { width: 250, height: 250 },
          rememberLastUsedCamera: true
        }
      );
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText, decodedResult) {
      // Pausa a leitura ao capturar um QR Code válido
      html5QrcodeScanner.clear();
      
      document.getElementById("loadingScanner").style.display = "block";
      document.getElementById("resultadoValida").classList.add("d-none");
      document.getElementById("btnReset").classList.add("d-none");

      // Chama a função de validação no Código.gs do Google Sheets
      google.script.run
        .withSuccessHandler(function(res) {
          document.getElementById("loadingScanner").style.display = "none";
          const resBox = document.getElementById("resultadoValida");
          resBox.classList.remove("d-none");
          document.getElementById("btnReset").classList.remove("d-none");

          if (res.success) {
            resBox.className = "result-box alert alert-success border-success text-dark text-start";
            resBox.innerHTML = res.message;
            // Efeito sonoro simples de aprovação (beep de sistema)
            tocarSom(true);
          } else {
            resBox.className = "result-box alert alert-danger border-danger text-dark text-start";
            resBox.innerHTML = res.message;
            tocarSom(false);
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById("loadingScanner").style.display = "none";
          const resBox = document.getElementById("resultadoValida");
          resBox.classList.remove("d-none");
          resBox.className = "result-box alert alert-warning border-warning";
          resBox.innerHTML = "Erro ao conectar com o servidor: " + err.message;
          document.getElementById("btnReset").classList.remove("d-none");
        })
        .validarQrCode(decodedText, senhaValidada);
    }

    function onScanFailure(error) {
      // Tratamento silencioso para leituras parciais de frame
    }

    function reiniciarLeitor() {
      document.getElementById("resultadoValida").classList.add("d-none");
      document.getElementById("btnReset").classList.add("d-none");
      inicializarScanner();
    }

    // Gerador de tom de áudio para dar feedback sem arquivos externos
    function tocarSom(sucesso) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (sucesso) {
          osc.frequency.setValueAtTime(880, ctx.currentTime); // Tom agudo rápido
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } else {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime); // Tom grave prolongado
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.45);
        }
      } catch (e) {}
    }
  </script>
</body>
</html>
